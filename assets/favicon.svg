<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Antenna -->
  <line x1="32" y1="4" x2="32" y2="14" stroke="#3b50df" stroke-width="3" stroke-linecap="round"/>
  <circle cx="32" cy="4" r="3" fill="#3b50df"/>
  
  <!-- Head -->
  <rect x="10" y="14" width="44" height="38" rx="8" ry="8" fill="#3b50df"/>
  
  <!-- Ears -->
  <rect x="3" y="24" width="7" height="14" rx="3" ry="3" fill="#3b50df"/>
  <rect x="54" y="24" width="7" height="14" rx="3" ry="3" fill="#3b50df"/>
  
  <!-- Eyes -->
  <ellipse cx="23" cy="31" rx="6" ry="7" fill="#f3f1eb"/>
  <ellipse cx="41" cy="31" rx="6" ry="7" fill="#f3f1eb"/>
  
  <!-- Pupils -->
  <circle cx="24" cy="31" r="3" fill="#2737a6"/>
  <circle cx="42" cy="31" r="3" fill="#2737a6"/>
  
  <!-- Eye shine -->
  <circle cx="22" cy="29" r="1.2" fill="white"/>
  <circle cx="40" cy="29" r="1.2" fill="white"/>
  
  <!-- Mouth -->
  <rect x="22" y="42" width="20" height="4" rx="2" fill="#f3f1eb"/>
  <!-- Mouth grid lines -->
  <line x1="27" y1="42" x2="27" y2="46" stroke="#3b50df" stroke-width="1"/>
  <line x1="32" y1="42" x2="32" y2="46" stroke="#3b50df" stroke-width="1"/>
  <line x1="37" y1="42" x2="37" y2="46" stroke="#3b50df" stroke-width="1"/>
  
  <!-- Jaw line / chin detail -->
  <rect x="18" y="48" width="28" height="3" rx="1.5" fill="#2737a6" opacity="0.3"/>
</svg>
